name: CraftBookPipePredicates
main: me.blvckbytes.craft_book_pipe_predicates.CraftBookPipePredicatesPlugin
version: 0.1
author: BlvckBytes
api-version: 1.14
depend: [CraftBook, ItemPredicateParser]
commands:
  pipepredicate:
permissions:
  craftbookpipepredicates.command.pipepredicate.read:
    description: 'Read predicates on pipe outputs'
    default: op
  craftbookpipepredicates.command.pipepredicate.modify:
    description: 'Modify predicates on pipe outputs'
    default: op
  craftbookpipepredicates.command.pipepredicate.reload:
    description: 'Reload the plugin''s configuration'
    default: op