# - current_page: Integer
# - number_pages: Integer
# - number_of_rows: Integer
# - last_slot: Integer
resultDisplay:
  title$: '@{RESULT-DISPLAY-TITLE}'
  rows: 6
  paginationSlots$: 'range(0, 44)'
  items:
    # https://github.com/BlvckBytes/BukkitEvaluable#itemstack-section
    previousPage:
      slots$: 'last_slot - 8'
      type: PLAYER_HEAD
      textures$: 'lut["textures"][if current_page > 1 then "ARROW_LEFT" else "ARROW_LEFT_RED"]'
      name$: 'if current_page > 1 then @{PREVIOUS-PAGE-NAME-HAS} else @{PREVIOUS-PAGE-NAME-HAS-NOT}'
      lore$:
        - '" "'
        - '@{ANY-CONTROL-LORE-SPACER}'
        - '@{PREVIOUS-PAGE-LORE-LEFT-CLICK-DESCRIPTION}'
        - '@{PREVIOUS-PAGE-LORE-RIGHT-CLICK-DESCRIPTION}'
        - '@{ANY-CONTROL-LORE-SPACER}'
    # https://github.com/BlvckBytes/BukkitEvaluable#itemstack-section
    nextPage:
      slots$: 'last_slot'
      type: PLAYER_HEAD
      textures$: 'lut["textures"][if current_page < number_pages then "ARROW_RIGHT"
        else "ARROW_RIGHT_RED"]'
      name$: 'if current_page < number_pages then @{NEXT-PAGE-NAME-HAS} else @{NEXT-PAGE-NAME-HAS-NOT}'
      lore$:
        - '" "'
        - '@{ANY-CONTROL-LORE-SPACER}'
        - '@{NEXT-PAGE-LORE-LEFT-CLICK-DESCRIPTION}'
        - '@{NEXT-PAGE-LORE-RIGHT-CLICK-DESCRIPTION}'
        - '@{ANY-CONTROL-LORE-SPACER}'
    # - container_x: Int
    # - container_y: Int
    # - container_z: Int
    # https://github.com/BlvckBytes/BukkitEvaluable#itemstack-section
    representativePatch:
      lore$:
        - '" "'
        - '@{ANY-CONTROL-LORE-SPACER}'
        - '@{REPRESENTATIVE-LORE-COORDINATES}'
        - '@{REPRESENTATIVE-LORE-SLOT}'
        - '@{ANY-CONTROL-LORE-SPACER}'
        - '@{REPRESENTATIVE-LORE-LEFT-CLICK-DESCRIPTION}'
        - '@{REPRESENTATIVE-LORE-DROP-ONE-DESCRIPTION}'
        - '@{REPRESENTATIVE-LORE-DROP-ALL-DESCRIPTION}'
        - '@{ANY-CONTROL-LORE-SPACER}'
    # https://github.com/BlvckBytes/BukkitEvaluable#itemstack-section
    filler:
      slots$:
        - 'last_slot - 7'
        - 'last_slot - 6'
        - 'last_slot - 5'
        - 'last_slot - 4'
        - 'last_slot - 3'
        - 'last_slot - 2'
        - 'last_slot - 1'
      type: BLACK_STAINED_GLASS_PANE
      name: " "

defaultPredicateLanguage: 'ENGLISH_US'

# Fully qualified names of classes which represent listeners for the SignChangeEvent - an event
# called to determine whether the player has the privileges to alter a pipe's state.
fakeEventSkippedListeners:
  # Avoid the "Pipe created!" message; this listener has no say in protection either
  - com.sk89q.craftbook.mechanics.pipe.Pipes

