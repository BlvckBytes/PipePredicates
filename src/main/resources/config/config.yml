  commandPipePredicateGetError: '{lut.prefix} <&7>Der zugehörige Kolben befindet sich im Fehlerzustand: <&c>{predicate_error}'
  commandPipePredicateFrameLockInit: '{lut.prefix} <&7>Interagiere mit einem <&a>Kolben, einem Behälter oder einem Schild<&7>, um <&a>Rahmen <&7>auf dem verbundenen Behälter zu <&a>sperren<&7>; nutze <&a>Sneak + Linksklick<&7>, um den <&a>Mehrfachmodus <&7>zu aktivieren.'
  commandPipePredicateFrameUnlockInit: '{lut.prefix} <&7>Interagiere mit einem <&a>Kolben, einem Behälter oder einem Schild<&7>, um <&a>Rahmen <&7>auf dem verbundenen Behälter zu <&a>entsperren<&7>; nutze <&a>Sneak + Linksklick<&7>, um den <&a>Mehrfachmodus <&7>zu aktivieren.'
  commandPipePredicateFrameLockNoFrames: '{lut.prefix} <&c>Konnte keine Rahmen auf dem zugehörigen Behälter finden!'
  commandPipePredicateFrameLockAlreadyLocked: '{lut.prefix} <&c>Alle Rahmen auf dem zugehörigen Behälter sind bereits gesperrt!'
  commandPipePredicateFrameLockFramesLocked: '{lut.prefix} <&7>Alle <&a>Rahmen <&7>auf dem zugehörigen Behälter sind nun gesperrt (<&a>{frame_count} Stück<&7>).'
  commandPipePredicateFrameLockAlreadyUnlocked: '{lut.prefix} <&c>Alle Rahmen auf dem zugehörigen Behälter sind bereits entsperrt!'
  commandPipePredicateFrameLockFramesUnlocked: '{lut.prefix} <&7>Alle <&a>Rahmen <&7>auf dem zugehörigen Behälter sind nun entsperrt (<&a>{frame_count} Stück<&7>).'
  commandPipePredicateReloadSuccess: '{lut.prefix} <&7>Die Konfiguration des Plugins wurde <&a>erfolgreich neu geladen<&7>!'
  commandPipePredicateReloadFailure: '{lut.prefix} <&c>Während des Neuladeprozesses der Konfiguration trat ein Fehler auf; bitte überprüfe die Konsole!'
  commandPipePredicateSearchInSession: '{lut.prefix} <&c>Es ist aktuell bereits eine Suche im Gange!'
  commandPipePredicateSearchExceededPipes: '{lut.prefix} <&e>Das Limit von <&6>{limit} Rohrblöcken <&e>wurde überschritten; stoppe vorzeitig!'
  commandPipePredicateSearchExceededPistons: '{lut.prefix} <&e>Das Limit von <&6>{limit} Ausgangskolben <&e>wurde überschritten; stoppe vorzeitig!'
  commandPipePredicateSearchExceededRetry: '{lut.prefix} <&e>Das Limit von <&6>{limit} Ladeversuchen <&e>wurde überschritten; stoppe vorzeitig!'
  commandPipePredicateSearchNoContainers: '{lut.prefix} <&c>Es konnten keine Behälter an Ausgangskolben gefunden werden (<&4>{piston_count} Kolben<&c>, <&4>{tube_count} Rohrblöcke<&c>)!'
  commandPipePredicateSearchActionbarWarmup: '<&6>[Pipe] Wärme auf... {tube_count} Rohre, {piston_count} Kolben'
  commandPipePredicateSearchNoResults: |
    {lut.prefix} <&c>Die Suche <&4>{predicate} <&c>ergab bei <&4>{item_count} Items <&c>keine Ergebnisse (<&4>{piston_count} Kolben<&c>, <&4>{tube_count} Rohrblöcke<&c>, <u><hover-text value={
      <&c *for-entry="container_counts" *for-separator={<&7>,<space/>}>{entry.count}x <translate key=`{entry.translation_key}`/>
    }><&4>{total_container_count} Behälter</u><&c>)!
  commandPipePredicateSearchLabelsAreUnsupported: '{lut.prefix} <&c>Label werden (aktuell) aus internen Gründen nicht bei der Suchfunktion unterstützt!'
  commandPipePredicateSearchShowingResults: |
    {lut.prefix} <&7>Die Suche <&a>{predicate} <&7>lieferte bei insgesamt <&a>{item_count} <&7>Items <&a>{match_count} <&7>Übereinstimmungen (<&a>{piston_count} Kolben<&7>, <&a>{tube_count} Rohrblöcke<&7>, <u><hover-text value={
      <&a *for-entry="container_counts" *for-separator={<&7>,<space/>}>{entry.count}x <translate key=`{entry.translation_key}`/>
    }><&a>{total_container_count} Behälter</u><&7>).
  commandPipePredicateSearchGetItemContainerAbsent: '{lut.prefix} <&c>Der Behälter <&4>existiert <&c>inzwischen nicht mehr; breche ab!'
  commandPipePredicateSearchGetItemContainerSizeChanged: '{lut.prefix} <&c>Die <&4>Größe <&c>des Behälters hat sich inzwischen verändert; breche ab!'
  commandPipePredicateSearchGetItemMoved: '{lut.prefix} <&c>Das Item <&4><tr key=`{item_type_key}`/> <&c>wurde inzwischen <&4>bewegt<&c>; breche ab!'
  commandPipePredicateSearchGetItemSuccess: '{lut.prefix} <&7>Vom Item <&a><tr key=`{item_type_key}`/> <&7>wurden insgesamt <&a>{lut.amount_display} <&7>ausgehändigt.'
  commandPipePredicateSearchGetNoSpace: '{lut.prefix} <&c>Du hast keinen Platz im Inventar!'
  commandPipePredicateSearchContainerOpened: '{lut.prefix} <&7>Du hast nun Einsicht in den Behälter bei <&a>{container_x} {container_y} {container_z}<&7>.'
  commandPipePredicateSearchContainerTeleportObstructed: '{lut.prefix} <&c>Der Behälter ist an allen Seiten durch unpassierbare Blöcke versperrt!'
  commandPipePredicateSearchContainerTeleported: '{lut.prefix} <&7>Du wurdest zum Behälter bei <&a>{container_x} {container_y} {container_z} <&7>teleportiert.'
  commandPipePredicateVisualizeInternalError: '{lut.prefix} <&c>Während des Visualisierens der Pipe, ausgehend von <&4>{origin_x} {origin_y} {origin_z}<&c>, trat ein interner Fehler auf; bitte melden!'
  commandPipePredicateVisualizeRanIntoLimit: '{lut.prefix} <&7>Das Visualisierungslimit von <&6>{cube_limit} <&7>Blöcken wurde überschritten; <&6>stoppe vorzeitig<&7>!'
  commandPipePredicateVisualizeSuccess: '{lut.prefix} <&7>Zeige <&a>{cube_count} <&7>visualisierte Pipe-Blöcke ausgehend von <&a>{origin_x} {origin_y} {origin_z}<&7> an.'
  commandPipePredicateVisualizeNoVisualization: '{lut.prefix} <&c>Es wird aktuell keine Visualisierung angezeigt, die entfernt werden könnte!'
  commandPipePredicateVisualizeClearedPriorVisualization: '{lut.prefix} <&7>Die <&6>vorherige Visualisierung <&7>wurde automatisch <&6>entfernt<&7>!'
  commandPipePredicateVisualizeClearedVisualization: '{lut.prefix} <&7>Die angezeigte Visualisierung wurde <&a>entfernt<&7>.'
  missingPermissionPipePredicateCommand: '{lut.prefix} <&c>Dir fehlen die nötigen Rechte um diesen Befehl zu benutzen!'
  commandPipePredicateLocatePredicateEmptyQuery: '{lut.prefix} <&c>Bitte gib eine Zeichenkette an, nach der innerhalb von Prädikaten gesucht werden soll!'
  commandPipePredicateLocatePredicateNoMatches: '{lut.prefix} <&c>Die Suche <&4>{query} <&c>ergab <&4>keine Ergebnisse<&c>!'
  commandPipePredicateLocatePredicateMatches: |
    {lut.spacer}<br/>
    <container *for-result="results" *for-separator={<br/>}>
      <&7>- <&a *for-part="result.predicate split query" *for-separator={<&2>{query}}>{part}</> <&7>(bei<space/>
      <hover-text value={<&a>Klicke, um dich zu teleportieren!}>
        <run-command value=`pipeteleport {result.x} {result.y} {result.z}`>
          <u><&a>{result.x} {result.y} {result.z}
      </hover-text>
      <&7>)
    </container>
    <br/>
    {lut.spacer}<br/>
    {lut.prefix} <&7>Die Suche <&a>{query} <&7>ergab die o.g. <&a>{len(results)} Übereinstimmung(en)<&7>.
  commandPipeTeleportExpired: '{lut.prefix} <&c>Der temporäre Befehl zur Teleportation nach <&4>{x} {y} {z} <&c>ist abgelaufen; versuche ihn erneut ausstellen zu lassen!'
  commandPipeTeleportTeleported: '{lut.prefix} <&7>Du wurdest zu den Koordinaten <&a>{x} {y} {z} <&7>teleportiert.'

searchDisplay:
  title: '<&8>Pipesuche <&e>{current_page}<&8>/<&e>{number_pages}'
  rows: 6
  paginationSlots: '0..44'
  items:
    previousPage:
      slots: 'last_slot - 8'
      type: PLAYER_HEAD
      textures: '{lut.textures[current_page > 1 then "ARROW_LEFT" else "ARROW_LEFT_RED"]}'
      name: |
        <reset>
          <container *if="current_page > 1"><&8>» <&6>Vorherige Seite <&8>«</container>
          <container *else><&8>» <&c>Keine vorherige Seite <&8>«</container>
      lore: |
        <reset *let-spacer="is_floodgate then lut.spacer_bedrock else lut.spacer">
          <br/>
          {spacer}<br/>
          <&8>➥ <&e>Linksklick <&7>Navigiere zur vorherigen Seite<br/>
          <&8>➥ <&e>Rechtsklick <&7>Springe zur ersten Seite<br/>
          {spacer}
    searchDetails:
      slots: 'last_slot - 4'
      type: OAK_SIGN
      name: |
        <reset>
          <&8>» <&6>Aktuelle Suche <&8>«
      lore: |
        <reset *let-spacer="is_floodgate then lut.spacer_bedrock else lut.spacer">
          {spacer}<br/>
          <&8>♦ <&7>Angegebenes Prädikat: <&e>{predicate}<br/>
          {spacer}
    backToCollectionsButton:
      slots: 'last_slot - 4'
      type: PLAYER_HEAD
      textures: '{lut.textures["ARROW_LEFT_BLACK"]}'
      name: |
        <reset>
          <&8>» <&6>Zurück <&8>«
      lore: |
        <reset *let-spacer="is_floodgate then lut.spacer_bedrock else lut.spacer">
          {spacer}<br/>
          <&8>➥ <&e>Linksklick <&7>Gelange zurück zur Übersicht<br/>
          {spacer}
    nextPage:
      slots: 'last_slot'
      type: PLAYER_HEAD
      textures: '{lut.textures[current_page < number_pages then "ARROW_RIGHT" else "ARROW_RIGHT_RED"]}'
      name: |
        <reset>
          <container *if="current_page < number_pages"><&8>» <&6>Nächste Seite <&8>«</container>
          <container *else><&8>» <&c>Keine nächste Seite <&8>«</container>
      lore: |
        <reset *let-spacer="is_floodgate then lut.spacer_bedrock else lut.spacer">
          <br/>
          {spacer}<br/>
          <&8>➥ <&e>Linksklick <&7>Navigiere zur nächsten Seite<br/>
          <&8>➥ <&e>Rechtsklick <&7>Springe zur letzten Seite<br/>
          {spacer}
    stackRepresentativePatch:
      lore: |
        <reset *let-spacer="is_floodgate then lut.spacer_bedrock else lut.spacer">
          <br/>
          {spacer}<br/>
          <&8>♦ <&7>Koordinaten: <&e>{container_x} {container_y} {container_z}<br/>
          <&8>♦ <&7>Slot: <&e>{slot}<br/>
          {spacer}<br/>
          <container *if="has(stack_actions)">
            <&8>♦ <&7>Aktuelle Aktion:<br/>
            <br/>
            <container *for-stack_action="stack_actions" *for-separator={<br/>}>
              <&8>➥ <&7><&e *use="stack_action.enabled">
                {lut.stack_action[stack_action.name] ?? "Unbekannte Aktion"}
              <&7>
            </container>
            <br/>
            {spacer}<br/>
            <&8>➥ <&e>Linksklick <&7>Aktuelle Aktion ausführen<br/>
            <&8>➥ <&e>Werfen <&7>Nächste Aktion wählen
          </container>
          <container *else>
            <&8>➥ <&e>Linksklick <&7>{lut.stack_action["TELEPORT_TO_CONTAINER"]}<br/>
            <&8>➥ <&e>Werfen <&7>{lut.stack_action["MOVE_TO_INVENTORY"]}<br/>
            <&8>➥ <&e>Alle Werfen <&7>{lut.stack_action["OPEN_CONTAINER"]}
          </container>
          <br/>
          {spacer}
    collectionRepresentativePatch:
      lore: |
        <reset *let-spacer="is_floodgate then lut.spacer_bedrock else lut.spacer">
          <br/>
          {spacer}<br/>
          <&8>♦ <&7>Anzahl: <&e *let-display_dks>{lut.amount_display}</><br/>
          {spacer}<br/>
          <container *if="has(collection_actions)">
            <&8>♦ <&7>Aktuelle Aktion:<br/>
            <br/>
            <container *for-collection_action="collection_actions" *for-separator={<br/>}>
              <&8>➥ <&7><&e *use="collection_action.enabled">
                {lut.collection_action[collection_action.name] ?? "Unbekannte Aktion"}
              <&7>
            </container>
            <br/>
            {spacer}<br/>
            <&8>➥ <&e>Linksklick <&7>Aktuelle Aktion ausführen<br/>
            <&8>➥ <&e>Werfen <&7>Nächste Aktion wählen
          </container>
          <container *else>
            <&8>➥ <&e>Linksklick <&7>{lut.collection_action["SHOW_STACKS"]}<br/>
            <&8>➥ <&e>Rechtsklick <&7>{lut.collection_action["GET_FOUR_STACKS"]}<br/>
            <&8>➥ <&e>Werfen <&7>{lut.collection_action["GET_ONE_STACK"]}<br/>
            <&8>➥ <&e>Alle Werfen <&7>{lut.collection_action["FILL_INVENTORY"]}
          </container>
          <br/>
          {spacer}
    filler:
      slots: '(last_slot - 7)..(last_slot - 1)'
      type: BLACK_STAINED_GLASS_PANE
      name: " "

capacityDisplay:
  title: '<&8>Kapazitäten <&e>{current_page}<&8>/<&e>{number_pages}'
  rows: 6
  paginationSlots: '0..44'
  items:
    previousPage:
      slots: 'last_slot - 8'
      type: PLAYER_HEAD
      textures: '{lut.textures[current_page > 1 then "ARROW_LEFT" else "ARROW_LEFT_RED"]}'
      name: |
        <reset>
          <container *if="current_page > 1"><&8>» <&6>Vorherige Seite <&8>«</container>
          <container *else><&8>» <&c>Keine vorherige Seite <&8>«</container>
      lore: |
        <reset *let-spacer="is_floodgate then lut.spacer_bedrock else lut.spacer">
          <br/>
          {spacer}<br/>
          <&8>➥ <&e>Linksklick <&7>Navigiere zur vorherigen Seite<br/>
          <&8>➥ <&e>Rechtsklick <&7>Springe zur ersten Seite<br/>
          {spacer}
    searchDetails:
      slots: 'last_slot - 6'
      type: OAK_SIGN
      name: |
        <reset>
          <&8>» <&6>Aktuelle Suche <&8>«
      lore: |
        <reset *let-spacer="is_floodgate then lut.spacer_bedrock else lut.spacer">
          {spacer}<br/>
          <&8>♦ <&7>Angegebenes Prädikat:<space/>
          <container *if="predicate">
            <&e>{predicate}
          </container>
          <container *else>
            <&7>/
          </container>
          <br/>
          <&8>♦ <&7>Angegebene Label:<space/>
          <container *if="len(predicate_labels) > 0">
            <&e *for-label="predicate_labels" *for-separator={<&7>,<space/>}>{label}</>
          </container>
          <container *else>
            <&7>/
          </container>
          <br/>
          <container +let-title="Verfügbare Label:" *let-labels="encountered_labels" [lut.label_line] /><br/>
          {spacer}
    backToPredicatesButton:
      slots: 'last_slot - 4'
      type: PLAYER_HEAD
      textures: '{lut.textures["ARROW_LEFT_BLACK"]}'
      name: |
        <reset>
          <&8>» <&6>Zurück <&8>«
      lore: |
        <reset *let-spacer="is_floodgate then lut.spacer_bedrock else lut.spacer">
          {spacer}<br/>
          <&8>➥ <&e>Linksklick <&7>Gelange zurück zur Übersicht<br/>
          {spacer}
    nextPage:
      slots: 'last_slot'
      type: PLAYER_HEAD
      textures: '{lut.textures[current_page < number_pages then "ARROW_RIGHT" else "ARROW_RIGHT_RED"]}'
      name: |
        <reset>
          <container *if="current_page < number_pages"><&8>» <&6>Nächste Seite <&8>«</container>
          <container *else><&8>» <&c>Keine nächste Seite <&8>«</container>
      lore: |
        <reset *let-spacer="is_floodgate then lut.spacer_bedrock else lut.spacer">
          <br/>
          {spacer}<br/>
          <&8>➥ <&e>Linksklick <&7>Navigiere zur nächsten Seite<br/>
          <&8>➥ <&e>Rechtsklick <&7>Springe zur letzten Seite<br/>
          {spacer}
    sorting:
      slots: 'last_slot - 2'
      type: COMPARATOR
      name: |
        <reset>
          <&8>» <&6>Sortierung <&8>«
      lore: |
        <reset>
          <br/>
          {lut.spacer}<br/>
          <container
            *for-sorting="sorting_selections"
            *for-separator={<br/>}
            *let-criterion="lut.sorting_criteria[sorting.criterion] ?? sorting.criterion"
            *let-renderer="lut.sorting_selection[sorting.selection] ?? sorting.selection"
          >
            <&8><&e *use="sorting.active">➥ <container [renderer] />
          </container>
          <br/>
          {lut.spacer}<br/>
          <&8>➥ <&e>Werfen <&7>Kriterium auswählen<br/>
          <&8>➥ <&e>Linksklick <&7>Sortierrichtung ändern<br/>
          <&8>➥ <&e>Alle werfen <&7>Nach unten verschieben<br/>
          <&8>➥ <&e>Rechtsklick <&7>Auswahlen zurücksetzen<br/>
          {lut.spacer}
    predicateRepresentative:
      type: '{lut.usage_level[usage_level].material}'
      name: |
        <reset>
          <&8>» {lut.usage_level[usage_level].name} <&8>«
      lore: |
        <reset *let-spacer="is_floodgate then lut.spacer_bedrock else lut.spacer">
          {spacer}<br/>
          <&8>♦ <&7>Anzahl Behälter: <&e>{container_count}<br/>
          <&8>♦ <&7>Benutzung: <&e>{occupied_slot_count}<&7>/<&e>{total_slot_count} <&7>(<&e><container *let-value="usage_percentage" [lut.percentage_display] /><&7>)<br/>
          <container *if="predicate">
            <&8>♦ <&e><word-wrap [value]="predicate" width=40 prefix={<&7>Prädikat:<space/>} subsequent-prefix={<space/><space/>} /><br/>
          </container>
          <container *else>
            <&8>♦ <&7>Prädikat: <&c>Kein Prädikat<br/>
          </container>
          <container *if="len(labels) > 0">
            <container +let-title="Label:" [lut.label_line] /><br/>
          </container>
          {spacer}<br/>
          <&8>➥ <&e>Linksklick <&7>Einzelne Behälter anzeigen<br/>
          {spacer}
    containerRepresentative:
      type: '{container_type}'
      name: |
        <reset>
          <&8>» <&6>Behälter <&8>«
      lore: |
        <reset *let-spacer="is_floodgate then lut.spacer_bedrock else lut.spacer">
          <br/>
          {spacer}<br/>
          <&8>♦ <&7>Benutzung: <&e>{occupied_slot_count}<&7>/<&e>{total_slot_count} <&7>(<&e><container *let-value="usage_percentage" [lut.percentage_display] /><&7>)<br/>
          <&8>♦ <&7>Koordinaten: <&e>{container_x} {container_y} {container_z}<br/>
          <container *if="len(labels) > 0">
            <container +let-title="Label:" [lut.label_line] /><br/>
          </container>
          {spacer}<br/>
          <&8>➥ <&e>Linksklick <&7>Zum Behälter teleportieren<br/>
          {spacer}
    filler:
      slots: '(last_slot - 7)..(last_slot - 1)'
      type: BLACK_STAINED_GLASS_PANE
      name: " "

defaultPredicateLanguage: 'GERMAN_DE'

# Fully qualified names of classes which represent listeners for the SignChangeEvent - an event
# called to determine whether the player has the privileges to alter a pipe's state.
fakeEventSkippedListeners:
  # Avoid the "Pipe created!" message; this listener has no say in protection either
  - com.sk89q.craftbook.mechanics.pipe.Pipes

