  commandPipePredicatePredicateError: '{lut.prefix} <&c>Fehlerhaftes Prädikat: <&4>{error_message}'
  commandPipePredicateEmptyPredicate: '{lut.prefix} <&c>Bitte gib nur valide, nicht-leere Prädikate ein!'
  commandPipePredicateRemoveInit: '{lut.prefix} <&7>Interagiere mit einem <&a>Kolben, einem Behälter oder einem Schild<&7>, um dessen Prädikat zu <&a>entfernen<&7>; nutze <&a>Sneak + Linksklick<&7>, um den <&a>Mehrfachmodus <&7>zu aktivieren.'
  commandPipePredicateRemoveSuccess: '{lut.prefix} <&7>Das Prädikat <&a>{predicate} <&7>des zugehörigen Kolbens wurde <&a>erfolgreich entfernt<&7>.'
  commandPipePredicateSetInit: '{lut.prefix} <&7>Interagiere mit einem <&a>Kolben, einem Behälter oder einem Schild<&7>, um dessen Prädikat auf <&a>{predicate} <&7>zu <&a>setzen<&7>; nutze <&a>Sneak + Linksklick<&7>, um den <&a>Mehrfachmodus <&7>zu aktivieren.'
  commandPipePredicateSetSuccess: '{lut.prefix} <&7>Das Prädikat des zugehörigen Kolbens wurde <&7>auf <&a>{predicate} <&7>gesetzt<&7>.'
  commandPipePredicateMissingLanguage: '{lut.prefix} <&c>Bitte gib die Sprache des Prädikats als nächsten Parameter an!'
  commandPipePredicateUnknownLanguage: '{lut.prefix} <&c>Die Eingabe <&4>{input} <&c>repräsentiert keine bekannte Sprache!'
  commandPipePredicateInteractMultiEntered: '{lut.prefix} <&7>Du hast den <&a>Mehrfachmodus <&7>aktiviert und kannst die Aktion nun auf mehrere Ein-/Ausgänge nacheinander anwenden; nutze <&a>Sneak + Linksklick <&7>erneut, um den Modus zu <&a>verlassen<&7>.'
  commandPipePredicateInteractMultiExited: '{lut.prefix} <&7>Du hast den Mehrfachmodus <&a>verlassen<&7>.'
  commandPipePredicateInteractMultiActionBarSignal: '<&a><&l>[Pipr] Mehrfachmodus aktiv; verlassen: Sneak + Linksklick'
  commandPipePredicateInteractExpired: '{lut.prefix} <&c>Deine ausstehende Interaktion ist aufgrund von Inaktivität ausgelaufen.'
  commandPipePredicateGetInit: '{lut.prefix} <&7>Interagiere mit einem <&a>Kolben, einem Behälter oder einem Schild<&7>, um dessen Prädikat <&7>zu <&a>lesen<&7>; nutze <&a>Sneak + Linksklick<&7>, um den <&a>Mehrfachmodus <&7>zu aktivieren.'
  commandPipePredicateGetPredicate: |
    {lut.prefix} <&7>Aktuell aktives Prädikat:<space/>
      <u>
        <hover-text value={<&a>Klicke auf das Prädikat, um einen Editierungsbefehl zu erhalten.}>
          <suggest-command value=`{set_command}`>
            <&a>{predicate}
      </u>
