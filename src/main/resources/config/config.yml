  commandPipePredicateNoPiston: '{lut.prefix} <&c>Konnte keinen zum angeklickten Block zugehörigen Kolben auffinden.'
  commandPipePredicateNoSign: '{lut.prefix} <&c>Der zugehörige Kolben trägt kein valides Pipe-Schild an sich!'
  commandPipePredicateCannotEditSign: '{lut.prefix} <&c>Dir fehlen die nötigen Rechte um das Schild dieses Kolbens zu editieren!'
  commandPipePredicateCannotBuild: '{lut.prefix} <&c>Dir fehlen die nötigen Rechte um auf die Blöcke zuzugreifen!'
